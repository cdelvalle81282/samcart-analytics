name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements-health.txt
      - name: Run health checks
        env:
          SAMCART_API_KEY: ${{ secrets.SAMCART_API_KEY }}
        run: python scripts/health_check.py

  diagnose:
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r scripts/requirements-health.txt

      - name: Capture check errors
        env:
          SAMCART_API_KEY: ${{ secrets.SAMCART_API_KEY }}
        run: python scripts/health_check.py --json-output /tmp/check_results.json || true

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_HOST_KEY: ${{ secrets.DROPLET_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DROPLET_HOST_KEY" > ~/.ssh/known_hosts

      - name: Collect server logs
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes deploy@167.99.167.244 \
            "journalctl -u samcart-analytics --no-pager -n 100 --output=short-precise; \
             echo '--- disk ---'; df -h /; \
             echo '--- memory ---'; free -h; \
             echo '--- service ---'; systemctl status samcart-analytics --no-pager -l" \
            > /tmp/server_logs.txt 2>&1 \
            || echo "(SSH failed — droplet may be unreachable)" > /tmp/server_logs.txt

          python3 - <<'EOF'
          import json
          with open("/tmp/check_results.json") as f:
              check_results = json.load(f)
          with open("/tmp/server_logs.txt") as f:
              logs = f.read()
          ctx = {"checks": check_results["checks"], "logs": logs}
          with open("/tmp/failure_context.json", "w") as f:
              json.dump(ctx, f)
          EOF

      - name: Diagnose and create GitHub issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          FAILURE_CONTEXT_PATH: /tmp/failure_context.json
        run: python scripts/diagnose.py
